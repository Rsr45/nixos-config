palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '{{ foreground }}'
color_fg1 = '{{ background }}'
color_bg1 = '{{ background | lighten(0.1)}}'
color_bg3 = '{{ background | lighten(0.2)}}'
color_blue = '{{color4}}'
color_aqua = '{{color6 | darken(0.2)}}'
color_green = '{{color2}}'
color_orange = '{{color9}}'
color_purple = '{{color5}}'
color_red = '{{color1}}'
color_yellow = '{{color3}}'

[os]
disabled = false
style = "bg:color_bg1 fg:color_fg0"

